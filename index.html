<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex Softwares Banner - Exact Replica</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="banner-canvas">
    
    <div class="decor-top-left">
      <span class="stroke-1"></span>
      <span class="stroke-2"></span>
      <span class="stroke-3"></span>
    </div>

    <div class="decor-bottom-right">
      <span class="pebble-large"></span>
      <span class="pebble-medium"></span>
      <span class="pebble-small"></span>
    </div>
    
    <div class="watercolor-overlay">
      <div class="splash-layer core-splash"></div>
      <div class="splash-layer left-splash"></div>
      <div class="splash-layer right-splash"></div>
      <div class="splash-layer bottom-splash"></div>
      <span class="water-drop drop-left-1"></span>
      <span class="water-drop drop-left-2"></span>
      <span class="water-drop drop-right-1"></span>
    </div>

    <div class="content-wrapper">
      
      <div class="logo-box">
        <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <path d="M 110,25 A 72,72 0 0,0 45,134 L 54,148 A 8,8 0 0,1 56,152 L 56,158 A 6,6 0 0,0 62,164 L 158,164 A 6,6 0 0,0 164,158 L 164,152 A 8,8 0 0,1 166,148 L 175,134 A 72,72 0 0,0 110,25 Z" fill="none" stroke="#000000" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
          
          <path d="M 110,40 A 56,56 0 0,0 60,123 L 68,136 L 152,136 L 160,123 A 56,56 0 0,0 110,40 Z" fill="#000000"/>
          
          <path d="M 72,176 L 148,176 A 8,8 0 0,1 156,184 L 156,186 A 12,12 0 0,1 144,198 L 76,198 A 12,12 0 0,1 64,186 L 64,184 A 8,8 0 0,1 72,176 Z" fill="#000000"/>
          <path d="M 90,206 L 130,206 A 10,10 0 0,1 140,216 L 140,217 A 3,3 0 0,1 137,220 L 103,220 A 3,3 0 0,1 100,217 L 100,216 A 10,10 0 0,1 90,206 Z" fill="#000000"/>
          
          <rect x="106" y="94" width="8" height="42" fill="#FFFFFF" rx="2"/>
          <circle cx="110" cy="88" r="9" fill="#FFFFFF"/>
          
          <path d="M 108,124 L 88,104 L 88,96" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="88" cy="90" r="7" fill="#FFFFFF"/>
          
          <path d="M 112,114 L 132,94 L 132,86" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="132" cy="80" r="7" fill="#FFFFFF"/>
        </svg>
      </div>

      <div class="divider-line"></div>

      <div class="text-group">
        <h1 class="brand-title">HEX SOFTWARES</h1>
        
        <div class="tagline-row">
          <span>INNOVATE</span>
          <span class="bar">|</span>
          <span>CONNECT</span>
          <span class="bar">|</span>
          <span>INSPIRE</span>
        </div>
        
        <h2 class="program-title">Internship Program</h2>
      </div>

    </div>
  </div>

</body>
</html>
