<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhombix Technologies Banner</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="banner-canvas">
    <div class="glow glow-top-left"></div>
    <div class="glow glow-bottom-right"></div>
    <div class="glow glow-bottom-left"></div>

    <div class="content-layer">
      
      <div class="torus-wrapper torus-left">
        <div class="torus-ring"></div>
      </div>

      <h1 class="brand-heading">Rhombix Technologies</h1>

      <div class="slogan-container">
        <p class="slogan-text">Sharpening your hidden skills for a brighter future</p>
      </div>

      <div class="torus-wrapper torus-right">
        <div class="torus-ring"></div>
      </div>

      <div class="contact-footer">
        <div class="badge-row">
          <span class="badge-text">www.rhombixtechnologies.com</span>
        </div>
        <div class="badge-row">
          <span class="badge-text">rhombixtechnologies@gmail.com</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
